limit_req_zone $binary_remote_addr zone=login:10m rate=100r/m;
limit_req_zone $binary_remote_addr zone=api:10m rate=100r/s;
limit_req_zone $binary_remote_addr zone=reset:10m rate=3r/m;

upstream ca_admin {
    server host.docker.internal:8080;
    keepalive 32;
}
upstream ca_minio { server docker-minio-1:9000; }

server {
    listen 80;
    server_name localhost;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name localhost;

    ssl_certificate     /etc/nginx/ssl/server.crt;
    ssl_certificate_key /etc/nginx/ssl/server.key;
    ssl_protocols TLSv1.3;
    client_max_body_size 50m;

    proxy_hide_header X-Powered-By;
    proxy_hide_header Server;

    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header X-XSS-Protection "1; mode=block";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location /assets/ {
        alias /opt/ca-admin/static/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
    location = / {
        return 302 /login.html;
    }

    location = /login {
        return 302 /login.html;
    }

    location /login.html {
        alias /opt/ca-admin/static/login.html;
    }
    location /app.html {
        alias /opt/ca-admin/static/app.html;
    }
    location /dashboard.html {
        alias /opt/ca-admin/static/dashboard.html;
    }

    location /pages/ {
        alias /opt/ca-admin/static/pages/;
    }

    location /api/auth/login {
        # limit_req zone=login burst=50 nodelay;
        proxy_pass http://ca_admin;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/password-reset/ {
        limit_req zone=reset burst=3 nodelay;
        proxy_pass http://ca_admin;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /ws/ {
        proxy_pass http://ca_admin;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400s;
    }

    location /api/ {
        # limit_req zone=api burst=100;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_pass http://ca_admin;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /oss/ {
        proxy_pass http://ca_minio/;
        proxy_set_header Host 127.0.0.1:9130;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /health {
        proxy_pass http://ca_admin/actuator/health;
        proxy_set_header Host $host;
    }

    location / {
        proxy_pass http://ca_admin;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;
    }
}