resolver 127.0.0.11 valid=30s;

map $ssl_client_s_dn $ssl_client_user {
    ~CN=([^,]+) $1;
    default "unknown";
}

server {
    listen 8443 ssl http2;
    server_name _;

    ssl_certificate     /etc/nginx/ssl/server.crt;
    ssl_certificate_key /etc/nginx/ssl/server.key;
    ssl_protocols       TLSv1.3;

    ssl_client_certificate /etc/nginx/ssl/ca.crt;
    ssl_verify_client      optional;
    ssl_verify_depth       2;

    charset utf-8;

    location = /health {
        add_header Access-Control-Allow-Origin * always;
        add_header Content-Type application/json always;
        if ($request_method = OPTIONS) { return 204; }
        if ($ssl_client_verify = SUCCESS) {
            return 200 '{"status":"ok"}';
        }
        return 403 '{"status":"no_cert"}';
    }

    location /app/ {
        # 去掉后端 ca_admin 返回的 CORS 头，避免与 nginx 的重复冲突
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Methods;
        proxy_hide_header Access-Control-Allow-Headers;
        proxy_hide_header Access-Control-Allow-Credentials;

        # nginx 统一加 CORS 头
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;

        if ($request_method = OPTIONS) { return 204; }
        if ($ssl_client_verify != SUCCESS) {
            return 403;
        }

        proxy_pass http://ca_admin/gateway/app/;
        proxy_set_header Host $host;
        proxy_set_header X-Client-User $ssl_client_user;
        proxy_set_header X-Client-Verify $ssl_client_verify;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_read_timeout 86400s;
    }

    location /internal/route/resolve {
        internal;
        proxy_pass http://ca_admin/internal/route/resolve;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header X-Client-User $ssl_client_user;
        proxy_set_header X-Client-Serial $ssl_client_serial;
        proxy_set_header X-Client-Verify $ssl_client_verify;
    }

    error_page 495 496 497 /cert-error;
    location = /cert-error {
        internal;
        default_type text/html;
        charset utf-8;
        return 403 '<h1>证书验证失败</h1>';
    }
}
